<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة المخزون</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e3a5f;
    --accent: #00c9ff;
    --accent2: #e040fb;
    --gold: #f5c518;
    --danger: #ff4757;
    --success: #2ed573;
    --text: #e8eaf6;
    --muted: #7986cb;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,201,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,201,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 500px; height: 500px; background: #00c9ff; top: -150px; right: -150px; animation: drift 8s ease-in-out infinite; }
  .blob-2 { width: 400px; height: 400px; background: #e040fb; bottom: -100px; left: -100px; animation: drift 10s ease-in-out infinite reverse; }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(30px, 20px); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeDown 0.6s ease;
  }

  .header-badge {
    display: inline-block;
    background: rgba(0,201,255,0.1);
    border: 1px solid rgba(0,201,255,0.3);
    color: var(--accent);
    font-size: 12px;
    font-family: 'Tajawal', sans-serif;
    padding: 4px 16px;
    border-radius: 20px;
    letter-spacing: 2px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }

  .header-sub {
    color: var(--muted);
    font-family: 'Tajawal', sans-serif;
    margin-top: 8px;
    font-size: 15px;
  }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 40px;
    animation: fadeUp 0.6s 0.2s both;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,201,255,0.05), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .stat-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .stat-card:hover::before { opacity: 1; }

  .stat-value {
    font-size: 32px;
    font-weight: 900;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    transition: all 0.3s;
  }
  .stat-value.gold { color: var(--gold); }
  .stat-value.purple { color: var(--accent2); }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Tajawal', sans-serif;
    margin-top: 4px;
  }

  /* Products grid */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }

  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    position: relative;
    overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    animation: fadeUp 0.5s both;
  }
  .product-card:nth-child(1) { animation-delay: 0.3s; }
  .product-card:nth-child(2) { animation-delay: 0.4s; }

  .product-card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    background: radial-gradient(circle, rgba(0,201,255,0.15), transparent 70%);
    border-radius: 50%;
    transform: translate(30px, -30px);
    transition: opacity 0.3s;
  }

  .product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 30px rgba(0,201,255,0.08);
    border-color: rgba(0,201,255,0.4);
  }

  .product-card.out-of-stock {
    opacity: 0.6;
    border-color: rgba(255,71,87,0.3);
  }
  .product-card.out-of-stock::after {
    background: radial-gradient(circle, rgba(255,71,87,0.15), transparent 70%);
  }

  .product-id {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Tajawal', sans-serif;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .product-name {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #fff;
  }

  .product-price {
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 20px;
  }
  .product-price span {
    font-size: 14px;
    font-weight: 400;
    color: var(--muted);
    margin-right: 4px;
  }

  .stock-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .stock-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-family: 'Tajawal', sans-serif;
  }

  .stock-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    animation: pulse-dot 2s infinite;
  }
  .stock-dot.low { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
  .stock-dot.empty { background: var(--danger); box-shadow: 0 0 8px var(--danger); animation: none; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .stock-count {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    transition: all 0.3s;
  }

  /* Progress bar */
  .stock-bar-wrap {
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    height: 5px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .stock-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--success), var(--accent));
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .stock-bar-fill.low { background: linear-gradient(90deg, var(--gold), #ff9f43); }
  .stock-bar-fill.empty { background: var(--danger); width: 100% !important; }

  /* Sell button */
  .sell-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    background: linear-gradient(135deg, var(--accent), #0080ff);
    color: #fff;
    letter-spacing: 0.5px;
  }

  .sell-btn::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.4s, height 0.4s;
  }
  .sell-btn:active::before { width: 300px; height: 300px; }

  .sell-btn:hover:not(:disabled) {
    transform: scale(1.02);
    box-shadow: 0 8px 24px rgba(0,201,255,0.3);
  }

  .sell-btn:disabled {
    background: rgba(255,71,87,0.2);
    color: var(--danger);
    cursor: not-allowed;
    border: 1px solid rgba(255,71,87,0.3);
  }

  .sell-btn.sold-anim {
    animation: sold-flash 0.4s ease;
  }

  @keyframes sold-flash {
    0% { transform: scale(1); }
    50% { transform: scale(0.95); background: var(--success); }
    100% { transform: scale(1); }
  }

  /* Log section */
  .log-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    animation: fadeUp 0.5s 0.5s both;
  }

  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .log-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .log-title::before {
    content: '';
    display: block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse-dot 1.5s infinite;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Tajawal', sans-serif;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

  .log-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
    overflow-y: auto;
    padding-left: 4px;
  }
  .log-list::-webkit-scrollbar { width: 4px; }
  .log-list::-webkit-scrollbar-track { background: transparent; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .log-empty {
    color: var(--muted);
    font-size: 13px;
    font-family: 'Tajawal', sans-serif;
    text-align: center;
    padding: 20px;
    opacity: 0.6;
  }

  .log-entry {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'Tajawal', sans-serif;
    animation: slideIn 0.3s ease;
  }
  .log-entry.success { background: rgba(46,213,115,0.08); border: 1px solid rgba(46,213,115,0.2); }
  .log-entry.error { background: rgba(255,71,87,0.08); border: 1px solid rgba(255,71,87,0.2); }

  .log-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .log-text { flex: 1; color: var(--text); line-height: 1.5; }
  .log-time { color: var(--muted); font-size: 11px; flex-shrink: 0; margin-top: 2px; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Number flip animation */
  .count-update {
    animation: countPop 0.3s ease;
  }
  @keyframes countPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); color: var(--accent); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="container">

  <div class="header">
    <div class="header-badge">INVENTORY SYSTEM</div>
    <h1>نظام إدارة المخزون</h1>
    <p class="header-sub">تتبع المنتجات وإتمام عمليات البيع في الوقت الفعلي</p>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-value" id="totalProducts">0</div>
      <div class="stat-label">إجمالي المنتجات</div>
    </div>
    <div class="stat-card">
      <div class="stat-value gold" id="totalStock">0</div>
      <div class="stat-label">إجمالي المخزون</div>
    </div>
    <div class="stat-card">
      <div class="stat-value purple" id="totalSales">0</div>
      <div class="stat-label">مبيعات الجلسة</div>
    </div>
  </div>

  <div class="products-grid" id="productsGrid"></div>

  <div class="log-section">
    <div class="log-header">
      <div class="log-title">سجل العمليات</div>
      <button class="clear-btn" onclick="clearLog()">مسح السجل</button>
    </div>
    <div class="log-list" id="logList">
      <div class="log-empty">لا توجد عمليات بعد. ابدأ البيع!</div>
    </div>
  </div>

</div>

<script>
  let inventory = [
    { id: 1, name: "منتج أ", price: 100, stock: 10 },
    { id: 2, name: "منتج ب", price: 250, stock: 5 }
  ];

  let sessionSales = 0;
  const MAX_STOCK = { 1: 10, 2: 5 };

  function getStockLevel(stock, max) {
    const pct = (stock / max) * 100;
    if (stock === 0) return 'empty';
    if (pct <= 30) return 'low';
    return 'ok';
  }

  function getStockBarWidth(stock, max) {
    return Math.max(0, (stock / max) * 100);
  }

  function renderProducts() {
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = '';

    inventory.forEach((product, idx) => {
      const max = MAX_STOCK[product.id] || product.stock;
      const level = getStockLevel(product.stock, max);
      const barWidth = getStockBarWidth(product.stock, max);
      const isOut = product.stock === 0;

      const card = document.createElement('div');
      card.className = `product-card${isOut ? ' out-of-stock' : ''}`;
      card.id = `card-${product.id}`;
      card.style.animationDelay = `${0.3 + idx * 0.1}s`;

      let dotClass = level === 'ok' ? '' : level;
      let statusText = level === 'ok' ? 'متوفر' : (level === 'low' ? 'مخزون منخفض' : 'نفذ المخزون');

      card.innerHTML = `
        <div class="product-id">#${String(product.id).padStart(3, '0')}</div>
        <div class="product-name">${product.name}</div>
        <div class="product-price">${product.price.toLocaleString('ar-DZ')}<span>دج</span></div>
        <div class="stock-row">
          <div class="stock-indicator">
            <div class="stock-dot ${dotClass}"></div>
            <span style="color:var(--muted)">${statusText}</span>
          </div>
          <div class="stock-count" id="stock-${product.id}">${product.stock} وحدة</div>
        </div>
        <div class="stock-bar-wrap">
          <div class="stock-bar-fill ${level === 'empty' ? 'empty' : level === 'low' ? 'low' : ''}" 
               id="bar-${product.id}" style="width:${barWidth}%"></div>
        </div>
        <button class="sell-btn" id="btn-${product.id}" onclick="sellProduct(${product.id})"
          ${isOut ? 'disabled' : ''}>
          ${isOut ? '✕  نفذ المخزون' : '⬤  بيع الآن'}
        </button>
      `;

      grid.appendChild(card);
    });

    updateStats();
  }

  function sellProduct(productId) {
    const product = inventory.find(p => p.id === productId);
    if (!product) return;

    const btn = document.getElementById(`btn-${productId}`);
    const stockEl = document.getElementById(`stock-${productId}`);
    const barEl = document.getElementById(`bar-${productId}`);
    const card = document.getElementById(`card-${productId}`);

    if (product.stock > 0) {
      product.stock--;
      sessionSales++;

      const max = MAX_STOCK[productId] || 10;
      const level = getStockLevel(product.stock, max);
      const barWidth = getStockBarWidth(product.stock, max);

      // Animate count
      stockEl.className = 'stock-count count-update';
      stockEl.textContent = `${product.stock} وحدة`;
      setTimeout(() => stockEl.className = 'stock-count', 350);

      // Update bar
      barEl.style.width = `${barWidth}%`;
      barEl.className = `stock-bar-fill ${level === 'empty' ? 'empty' : level === 'low' ? 'low' : ''}`;

      // Button flash
      btn.classList.add('sold-anim');
      setTimeout(() => btn.classList.remove('sold-anim'), 400);

      if (product.stock === 0) {
        card.classList.add('out-of-stock');
        btn.disabled = true;
        btn.textContent = '✕  نفذ المخزون';
      }

      // Update dot + status
      setTimeout(() => renderDotInCard(card, product, max), 10);

      addLog('success', `تم بيع ${product.name} بسعر ${product.price.toLocaleString('ar-DZ')} دج — المتبقي: ${product.stock} وحدة`);
      updateStats();

    } else {
      addLog('error', `المنتج "${product.name}" غير متوفر في المخزون!`);
    }
  }

  function renderDotInCard(card, product, max) {
    const level = getStockLevel(product.stock, max);
    const dot = card.querySelector('.stock-dot');
    const statusSpan = card.querySelector('.stock-indicator span');
    dot.className = `stock-dot ${level === 'ok' ? '' : level}`;
    statusSpan.textContent = level === 'ok' ? 'متوفر' : (level === 'low' ? 'مخزون منخفض' : 'نفذ المخزون');
  }

  function updateStats() {
    const totalStock = inventory.reduce((s, p) => s + p.stock, 0);
    animateNumber('totalProducts', inventory.length);
    animateNumber('totalStock', totalStock);
    animateNumber('totalSales', sessionSales);
  }

  function animateNumber(id, target) {
    const el = document.getElementById(id);
    const current = parseInt(el.textContent) || 0;
    if (current === target) return;
    el.textContent = target;
    el.style.transform = 'scale(1.2)';
    el.style.color = id === 'totalSales' ? 'var(--accent2)' : 
                     id === 'totalStock' ? 'var(--gold)' : 'var(--accent)';
    setTimeout(() => {
      el.style.transform = 'scale(1)';
    }, 200);
  }

  function addLog(type, message) {
    const list = document.getElementById('logList');
    const empty = list.querySelector('.log-empty');
    if (empty) empty.remove();

    const now = new Date();
    const time = now.toLocaleTimeString('ar-DZ', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    entry.innerHTML = `
      <div class="log-icon">${type === 'success' ? '✓' : '✗'}</div>
      <div class="log-text">${message}</div>
      <div class="log-time">${time}</div>
    `;

    list.insertBefore(entry, list.firstChild);
  }

  function clearLog() {
    const list = document.getElementById('logList');
    list.innerHTML = '<div class="log-empty">لا توجد عمليات بعد. ابدأ البيع!</div>';
  }

  // Init
  renderProducts();
</script>
</body>
      </html>
